services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    init: true
    cpus: 4
    mem_limit: 6g
    shm_size: 1g
    volumes:
      - ..:/workspaces/context-engineering-workshop-java:cached
      - maven-cache:/home/vscode/.m2
      - npm-cache:/home/vscode/.npm
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      AGENT_MEMORY_SERVER_URL: http://redis-agent-memory-server:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_LANGCACHE_SERVICE_BASEURL: ${REDIS_LANGCACHE_SERVICE_BASEURL:-}
      REDIS_LANGCACHE_SERVICE_APIKEY: ${REDIS_LANGCACHE_SERVICE_APIKEY:-}
      REDIS_LANGCACHE_SERVICE_CACHEID: ${REDIS_LANGCACHE_SERVICE_CACHEID:-}
      CHAT_MEMORY_MAX_TOKENS: ${CHAT_MEMORY_MAX_TOKENS:-2000}
    depends_on:
      redis-database:
        condition: service_healthy
      redis-agent-memory-server:
        condition: service_started

  redis-database:
    container_name: redis-database
    hostname: redis-database
    image: redis:8.6.0
    volumes:
      - redis-data:/data
    environment:
      REDIS_ARGS: --save 30 1
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 5s

  redis-agent-memory-server:
    container_name: redis-agent-memory-server
    hostname: redis-agent-memory-server
    image: redislabs/agent-memory-server:0.13.2
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis-database:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DISABLE_AUTH: "false"
    command: agent-memory api --host 0.0.0.0 --port 8000 --task-backend=asyncio
    depends_on:
      redis-database:
        condition: service_healthy

  redis-insight:
    container_name: redis-insight
    hostname: redis-insight
    image: redis/redisinsight:3.0.2
    ports:
      - "5540:5540"
    environment:
      RI_REDIS_HOST: redis-database
      RI_REDIS_PORT: "6379"
    depends_on:
      redis-database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O- http://redis-insight:5540/api/health | grep -q '\"status\":\"up\"'"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 5s

volumes:
  redis-data:
  maven-cache:
  npm-cache:
