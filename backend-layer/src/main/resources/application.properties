spring.application.name=Workshop Backend Application

springdotenv.directory=${SPRINGDOTENV_DIRECTORY:../}
springdotenv.export-to-system-properties=true

langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.chat-model.model-name=gpt-3.5-turbo
langchain4j.open-ai.chat-model.max-tokens=4096
langchain4j.open-ai.chat-model.temperature=0.7


redis.langcache.service.baseurl=${REDIS_LANGCACHE_SERVICE_BASEURL:your-base-url}
redis.langcache.service.apikey=${REDIS_LANGCACHE_SERVICE_APIKEY:your-key}
redis.langcache.service.cacheid=${REDIS_LANGCACHE_SERVICE_CACHEID:default-cache}
